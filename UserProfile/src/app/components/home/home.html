<section>
  <div class="container-fluid text-center">
    <div class="row row-cols-5">
      @if(current_page() !== NO_PAGE){ <!-- Para que no se cargue el contenido por defecto hasta que no se haya ejecutado la petición al cliente-->
        @for(user of pages[current_page()].results; track user.id ){
        <div class="col">
          <app-caption [user] = "user"></app-caption>
        </div>
        }
      }

    </div>
  </div>

  <div id="home-page-changer"></div>
<router-outlet></router-outlet>
</section>

<footer>
  <button class="page-circle">1</button>
  <div class="page-interline"></div>
  <button class="page-circle">2</button>
  <div class="page-interline"></div>
  <button class="page-circle">3</button>
</footer>
